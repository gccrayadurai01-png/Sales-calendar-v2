# Render.com Blueprint: https://render.com/docs/blueprint-spec
# After deploy, set HUBSPOT_ACCESS_TOKEN in the service Environment tab.
# For persistent SQLite across deploys, add a Disk (paid) and set SQLITE_DB_PATH to the mount path.
# Vite lives in frontend dependencies so it installs even when NODE_ENV=production.

services:
  - type: web
    name: sales-calendar
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
