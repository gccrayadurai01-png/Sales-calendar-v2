# Render.com Blueprint
# After first deploy, set HUBSPOT_ACCESS_TOKEN in the Environment tab.

services:
  - type: web
    name: sales-calendar
    runtime: node
    plan: free
    buildCommand: bash build.sh
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        value: file:data/sales-calendar.db
